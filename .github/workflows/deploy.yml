name: Deploy to Hetzner VPS

on:
  push:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  HETZNER_HOST: 91.99.204.182
  HETZNER_USER: deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        env:
          NEXT_PUBLIC_WEB3FORMS_KEY: ${{ secrets.NEXT_PUBLIC_WEB3FORMS_KEY }}
        run: npm run build

      - name: Add SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          # Strip CR characters (in case the secret was pasted with CRLF line
          # endings from a Windows terminal) and ensure a single trailing LF.
          # Without this, OpenSSH rejects the key with "error in libcrypto".
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Validate the key parses before we try to use it — fails loudly here
          # rather than silently as a confusing "Permission denied" later.
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null
          ssh-keyscan -H "$HETZNER_HOST" >> ~/.ssh/known_hosts

      - name: Rsync build output to VPS
        run: |
          # rrsync on the server side hardcodes the destination path
          # to /var/www/manuel-buser.com, so we just rsync to "./".
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            out/ "$HETZNER_USER@$HETZNER_HOST:./"
